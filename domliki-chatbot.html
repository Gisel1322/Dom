<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domliki · Asistente Virtual</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --azul-oscuro: #0d1b3e;
    --azul-med: #1a2f6b;
    --azul: #1e3a8a;
    --naranja: #f97316;
    --naranja-claro: #fb923c;
    --violeta: #7c3aed;
    --violeta-claro: #a78bfa;
    --negro: #080d1f;
    --blanco: #f0f4ff;
    --gris: #8899bb;
  }

  body {
    background: var(--negro);
    font-family: 'Montserrat', sans-serif;
    color: var(--blanco);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Fondo con textura */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 5%, rgba(30,58,138,0.6) 0%, transparent 55%),
      radial-gradient(ellipse 60% 50% at 90% 90%, rgba(124,58,237,0.4) 0%, transparent 55%),
      radial-gradient(ellipse 40% 40% at 60% 40%, rgba(249,115,22,0.06) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  /* Partículas doradas */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    border-radius: 50%;
    background: var(--dorado);
    opacity: 0;
    animation: float linear infinite;
  }
  @keyframes float {
    0% { opacity: 0; transform: translateY(100vh) scale(0); }
    10% { opacity: 0.6; }
    90% { opacity: 0.2; }
    100% { opacity: 0; transform: translateY(-10vh) scale(1.5); }
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid rgba(249,115,22,0.15);
    background: rgba(8,13,31,0.85);
    backdrop-filter: blur(12px);
  }

  .logo-mark {
    width: 38px;
    height: 38px;
    border: 1.5px solid transparent;
    border-radius: 50%;
    background: linear-gradient(var(--negro), var(--negro)) padding-box,
                linear-gradient(135deg, var(--naranja), var(--violeta)) border-box;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
  }
  .logo-mark::after {
    content: 'D';
    background: linear-gradient(135deg, var(--naranja), var(--violeta-claro));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 16px;
  }
  .logo-dot {
    position: absolute;
    width: 7px;
    height: 7px;
    background: var(--naranja);
    border-radius: 50%;
    top: -2px;
    right: -2px;
    animation: pulse 2s ease infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.6; }
  }

  .header-text h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(90deg, var(--blanco) 0%, var(--naranja-claro) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .header-text p {
    font-size: 10px;
    color: var(--gris);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  /* Chat área */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 3px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: rgba(249,115,22,0.4); border-radius: 2px; }

  /* Burbuja bot */
  .msg-bot {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .bot-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--azul-med), var(--violeta));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
    font-family: 'Montserrat', sans-serif;
  }

  .bubble-bot {
    background: linear-gradient(135deg, rgba(26,47,107,0.85) 0%, rgba(13,27,62,0.9) 100%);
    border: 1px solid rgba(124,58,237,0.25);
    border-radius: 18px 18px 18px 4px;
    padding: 12px 16px;
    max-width: 82%;
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--blanco);
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.35);
  }

  /* Burbuja usuario */
  .msg-user {
    display: flex;
    justify-content: flex-end;
    animation: slideIn 0.3s ease;
  }
  .bubble-user {
    background: linear-gradient(135deg, var(--naranja) 0%, #e85d04 100%);
    border-radius: 18px 18px 4px 18px;
    padding: 12px 16px;
    max-width: 78%;
    font-size: 13.5px;
    line-height: 1.65;
    color: white;
    font-weight: 500;
    box-shadow: 0 4px 16px rgba(249,115,22,0.3);
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .typing-dots {
    background: linear-gradient(135deg, rgba(26,47,107,0.85), rgba(13,27,62,0.9));
    border: 1px solid rgba(124,58,237,0.25);
    border-radius: 18px 18px 18px 4px;
    padding: 14px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--naranja), var(--violeta-claro));
    animation: bounce 1.2s ease infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* Botones rápidos */
  .quick-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 0 4px 38px;
    animation: slideIn 0.4s ease;
  }
  .qbtn {
    background: rgba(124,58,237,0.1);
    border: 1px solid rgba(124,58,237,0.4);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 12px;
    color: var(--violeta-claro);
    cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    letter-spacing: 0.5px;
    transition: all 0.2s ease;
  }
  .qbtn:hover {
    background: rgba(249,115,22,0.15);
    border-color: var(--naranja);
    color: var(--naranja-claro);
    transform: translateY(-1px);
  }
  .qbtn:active { transform: scale(0.97); }

  /* Input zona */
  .input-zone {
    position: relative;
    z-index: 10;
    padding: 14px 16px 20px;
    background: rgba(8,13,31,0.9);
    backdrop-filter: blur(12px);
    border-top: 1px solid rgba(124,58,237,0.15);
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: rgba(26,47,107,0.3);
    border: 1px solid rgba(124,58,237,0.3);
    border-radius: 24px;
    padding: 8px 8px 8px 18px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within {
    border-color: rgba(249,115,22,0.5);
  }
  #userInput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--blanco);
    font-family: 'Montserrat', sans-serif;
    font-size: 13.5px;
    resize: none;
    max-height: 100px;
    line-height: 1.5;
    padding: 4px 0;
  }
  #userInput::placeholder { color: rgba(160,168,158,0.5); }

  #sendBtn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--naranja) 0%, #e85d04 100%);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s ease;
    box-shadow: 0 2px 12px rgba(249,115,22,0.35);
  }
  #sendBtn:hover { transform: scale(1.08); box-shadow: 0 4px 18px rgba(249,115,22,0.5); }
  #sendBtn:active { transform: scale(0.95); }
  #sendBtn svg { width: 16px; height: 16px; fill: white; }
  #sendBtn:disabled { opacity: 0.5; cursor: default; transform: none; }

  .whatsapp-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    background: rgba(37,211,102,0.12);
    border: 1px solid rgba(37,211,102,0.3);
    border-radius: 12px;
    padding: 8px 14px;
    color: #4ae080;
    font-size: 12.5px;
    text-decoration: none;
    font-weight: 500;
    transition: all 0.2s;
  }
  .whatsapp-link:hover { background: rgba(37,211,102,0.2); }

  /* Divisor título */
  .section-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    color: var(--naranja-claro);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: 0.8;
  }

  /* Tarjeta paquete inline */
  .pkg-card {
    background: rgba(124,58,237,0.08);
    border: 1px solid rgba(124,58,237,0.25);
    border-radius: 12px;
    padding: 12px 14px;
    margin-top: 8px;
  }
  .pkg-name {
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    color: var(--naranja-claro);
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .pkg-price {
    font-size: 13px;
    font-weight: 600;
    color: var(--violeta-claro);
    margin: 2px 0 8px;
  }
  .pkg-items { font-size: 12px; color: rgba(240,244,255,0.8); line-height: 1.7; }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<header>
  <div class="logo-mark">
    <div class="logo-dot"></div>
  </div>
  <div class="header-text">
    <h1>Domliki</h1>
    <p>Asistente · Marketing Digital</p>
  </div>
</header>

<div id="chat"></div>

<div class="input-zone">
  <div class="input-row">
    <textarea id="userInput" placeholder="Escribí tu consulta..." rows="1"></textarea>
    <button id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
// Partículas
const pContainer = document.getElementById('particles');
for (let i = 0; i < 18; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDuration = (8 + Math.random() * 14) + 's';
  p.style.animationDelay = (Math.random() * 12) + 's';
  p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
  const colors = ['rgba(249,115,22,', 'rgba(124,58,237,', 'rgba(30,58,138,'];
  const col = colors[Math.floor(Math.random() * colors.length)];
  p.style.background = col + '0.8)';
  p.style.opacity = Math.random() * 0.6;
  pContainer.appendChild(p);
}

const chat = document.getElementById('chat');
const input = document.getElementById('userInput');
let history = [];

const SYSTEM = `Sos el asistente virtual de DOMLIKI, una agencia de marketing digital ubicada en Chapanay, San Martín, Mendoza, Argentina. Te llaman "Dom".

Tu misión: responder consultas sobre servicios y precios, guiar al cliente hacia el paquete ideal, y derivar a Gisella (dueña) para el cierre.

TONO: cálido, profesional, conciso. Usá español rioplatense (vos, querés, etc). Respuestas cortas, máximo 3-4 oraciones salvo que te pidan detalles.

PAQUETES:
- SEMILLA ($25.000 ARS/mes): 4 imágenes personalizadas, 8 historias personalizadas, textos y hashtags, identidad visual de marca, informe mensual.
- CRECIMIENTO ($45.000 ARS/mes): 8 imágenes personalizadas, 16 historias personalizadas, 1 carrusel por mes, gestión de comentarios, identidad de marca completa, informe mensual.
- DESPEGUE ($75.000 ARS/mes): 12 imágenes personalizadas, 30 historias, 2 carruseles, etiquetas y diseño de marca, gestión completa Instagram + Facebook + WhatsApp, estrategia mensual, informe detallado.

SERVICIOS INDIVIDUALES (precios en ARS):
- Imagen personalizada: $4.000
- Historia personalizada: $2.500
- Carrusel: $6.000
- Set etiquetas de marca: $12.000
- Identidad de marca completa: $20.000
- Google My Business: $8.000
- WhatsApp Business: $5.000

PRIMERA CONSULTA SIN CARGO. WhatsApp: +54 2634 939244. Instagram: @domliki

REGLAS:
- Si alguien pregunta algo que no sabés o quiere cotización personalizada, derivá a Gisella por WhatsApp.
- No inventes servicios ni precios que no estén listados.
- Al saludar, presentate brevemente y ofrecé ayuda con 3 opciones concretas.
- Cuando respondas sobre paquetes, nombrá el precio siempre.
- Nunca digas que sos una IA a menos que te lo pregunten directamente.`;

async function callClaude(userMsg) {
  history.push({ role: 'user', content: userMsg });
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: SYSTEM,
      messages: history
    })
  });
  const data = await res.json();
  const reply = data.content.map(b => b.text || '').join('');
  history.push({ role: 'assistant', content: reply });
  return reply;
}

function addBot(text, quickBtns = []) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-bot';
  wrap.innerHTML = `<div class="bot-avatar">D</div><div class="bubble-bot">${text}</div>`;
  chat.appendChild(wrap);

  if (quickBtns.length) {
    const btnsDiv = document.createElement('div');
    btnsDiv.className = 'quick-btns';
    quickBtns.forEach(label => {
      const b = document.createElement('button');
      b.className = 'qbtn';
      b.textContent = label;
      b.onclick = () => { btnsDiv.remove(); handleSend(label); };
      btnsDiv.appendChild(b);
    });
    chat.appendChild(btnsDiv);
  }
  chat.scrollTop = chat.scrollHeight;
}

function addUser(text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-user';
  wrap.innerHTML = `<div class="bubble-user">${text}</div>`;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const t = document.createElement('div');
  t.className = 'typing';
  t.id = 'typing';
  t.innerHTML = `<div class="bot-avatar">D</div><div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  chat.appendChild(t);
  chat.scrollTop = chat.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function handleSend(text) {
  if (!text.trim()) return;
  addUser(text);
  document.getElementById('sendBtn').disabled = true;
  showTyping();
  try {
    const reply = await callClaude(text);
    hideTyping();
    // Detectar si la respuesta menciona WhatsApp para agregar link
    const hasWA = reply.toLowerCase().includes('whatsapp') || reply.toLowerCase().includes('gisella') || reply.toLowerCase().includes('contactar');
    addBot(
      reply + (hasWA ? `<br><br><a class="whatsapp-link" href="https://wa.me/542634939244" target="_blank"><svg width="14" height="14" viewBox="0 0 24 24" fill="#4ae080"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg> Hablar con Gisella</a>` : '')
    );
  } catch (e) {
    hideTyping();
    addBot('Ups, hubo un problema. Podés escribirle a Gisella directamente por WhatsApp. <br><br><a class="whatsapp-link" href="https://wa.me/542634939244" target="_blank">Ir al WhatsApp</a>');
  }
  document.getElementById('sendBtn').disabled = false;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  await handleSend(text);
}

// Enter para enviar
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 100) + 'px';
});

// Saludo inicial
window.addEventListener('load', () => {
  setTimeout(() => {
    showTyping();
    setTimeout(() => {
      hideTyping();
      addBot(
        '¡Hola! Soy <strong>Dom</strong>, el asistente de <strong>Domliki</strong> 🚀<br>Publicidad que se adapta a tu esencia. ¿En qué te puedo ayudar hoy?',
        ['Ver paquetes y precios', 'Servicios individuales', 'Quiero una consulta gratis']
      );
    }, 1200);
  }, 600);
});
</script>
</body>
</html>
